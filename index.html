<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ozzie Smith El</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #333; background: #fff; max-width: 860px; margin: 0 auto; padding: 40px 32px; }
    h1 { font-size: 28px; font-weight: bold; }
    .contact { color: #595959; font-size: 14px; margin: 6px 0 24px; }
    .contact a { color: #2E74B5; text-decoration: none; }
    .section-title { font-size: 11px; font-weight: bold; color: #2E74B5; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1.5px solid #2E74B5; padding-bottom: 4px; margin: 24px 0 10px; }
    .focus { font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .job { margin-bottom: 10px; }
    .job-header { font-size: 14px; margin-bottom: 3px; }
    .job-header b { font-weight: bold; }
    .job-header span { color: #595959; font-size: 13px; }
    ul { padding-left: 18px; }
    ul li { font-size: 13px; line-height: 1.7; }
    .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .skill-item { font-size: 13px; line-height: 1.6; }
    .skill-item b { color: #333; }
  </style>
</head>
